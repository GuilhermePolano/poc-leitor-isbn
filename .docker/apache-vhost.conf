<VirtualHost *:80>
    ServerAdmin webmaster@localhost

    # Redirect HTTP -> HTTPS
    # Em dev (host expõe 8080->80 e 8443->443), reescreve a porta 8080 para 8443.
    # Em produção (sem porta no Host), apenas troca esquema.
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteCond %{HTTP_HOST} ^([^:]+):8080$
    RewriteRule ^(.*)$ https://%1:8443$1 [R=301,L]
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    # Endpoints REST (pasta /api ao lado de /public)
    Alias /api /var/www/html/api
    <Directory /var/www/html/api>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/app.crt
    SSLCertificateKeyFile /etc/ssl/private/app.key

    Header always set Permissions-Policy "camera=(self), microphone=()"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
