services:
  db:
    image: mariadb:11
    container_name: isbn_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: isbn_app
      MARIADB_USER: isbn_user
      MARIADB_PASSWORD: changeme
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build:
      context: ./.docker
      dockerfile: Dockerfile
    container_name: isbn_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    ports:
      - "8080:80"

volumes:
  db_data:
